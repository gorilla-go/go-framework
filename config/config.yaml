# Server 配置
server:
  port: 8081
  mode: debug # debug, release
  read_timeout: 60
  write_timeout: 60
  idle_timeout: 60
  enable_rate_limit: true # 是否启用全局限流
  rate_limit: 100 # 每秒最大请求数
  rate_burst: 200 # 突发情况下允许的最大请求数
  # 可信代理列表（IP/CIDR）。仅当请求直接来源在此列表时才信任 X-Forwarded-For 等转发头。
  # 非必填，可按需配置：
  #   - 省略本项        → 用默认值 [127.0.0.1, ::1]，仅信任本机回环（同机反向代理）
  #   - trusted_proxies: []                    → 关闭：忽略所有转发头，直接用对端真实 IP（无代理时最安全）
  #   - trusted_proxies: [0.0.0.0/0, ::/0]     → 信任所有代理（仅限完全可控的内网网关后）
  # 注意：填写非法 IP/CIDR 会导致启动失败。
  trusted_proxies:
    - 127.0.0.1
    - ::1

# 日志配置
log:
  level: debug # debug, info, warn, error, fatal, panic
  filename: logs/app.log
  max_size: 100 # MB
  max_backups: 10
  max_age: 30 # days
  compress: true
  format: json # json, text
  stdout: true # 是否同时输出到控制台（开发时建议开启）

# 数据库配置
database:
  driver: mysql  # mysql, sqlite
  host: localhost
  port: 3306
  username: root
  password: password
  dbname: test
  max_idle_conns: 10
  max_open_conns: 100
  conn_max_lifetime: 3600 # seconds

# Redis配置
redis:
  host: localhost
  port: 6379
  password: ""
  db: 0
  pool_size: 10

# JWT配置
jwt:
  secret: "your-secret-key"
  expire: 24 # hours
  issuer: "go-framework"

# 模板配置
template:
  path: templates
  layout_dir: layouts
  default_layout: main
  extension: html

# 静态文件配置
static:
  path: ./static/dist

# Session配置
session:
  store: cookie # cookie, redis, gorm, memory
  name: go_session
  secret: "session-secret-key"
  max_age: 60 # 分钟
  secure: false
  http_only: true
  path: /
  domain: ""
  same_site: lax # lax, strict, none